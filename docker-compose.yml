name: Deploy Dummy API to Lighthouse

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Deploy to server via SSH
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            # Fix permissions
            sudo chown -R ubuntu:ubuntu ~/dummy-api || true

            # Create folder if first time
            mkdir -p ~/dummy-api

            # If git not initialized yet
            if [ ! -d ~/dummy-api/.git ]; then
              cd ~/dummy-api
              git init
              git remote add origin https://github.com/ferdianmaulana/dummy-api.git
            fi

            cd ~/dummy-api

            # Pull latest
            git fetch origin
            git reset --hard origin/main

            # Rebuild and restart
            sudo docker compose down
            sudo docker compose build --no-cache
            sudo docker compose up -d

            echo "Dummy API deployed!"